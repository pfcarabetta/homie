version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_USER: homie
      POSTGRES_PASSWORD: homie
      POSTGRES_DB: homie
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/api/src/db/migrations/00000_enable_postgis.sql:/docker-entrypoint-initdb.d/00000_enable_postgis.sql

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
