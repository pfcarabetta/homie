<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Homie — AI-Powered Home Maintenance & Service Provider Matching</title>
    <meta name="description" content="Stop calling around for home repair quotes. Homie's AI agent calls, texts, and emails local pros for you — and brings back quotes in minutes. Free DIY diagnostics, plumbing, HVAC, electrical, and 16+ service categories." />
    <meta name="keywords" content="home maintenance, home repair, plumber near me, HVAC repair, electrician, get quotes, AI home services, property management, vacation rental maintenance, find contractor, home service quotes" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="canonical" href="https://homiepro.ai/" />

    <!-- Open Graph (Facebook, WhatsApp, iMessage, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://homiepro.ai/" />
    <meta property="og:title" content="Homie — AI-Powered Home Maintenance & Service Provider Matching" />
    <meta property="og:description" content="Stop calling around. Homie's AI agent calls, texts, and contacts local pros for you — and brings back quotes in minutes." />
    <meta property="og:image" content="https://homiepro.ai/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Homie" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Homie — AI-Powered Home Maintenance" />
    <meta name="twitter:description" content="Stop calling around. Homie's AI agent calls, texts, and contacts local pros for you — and brings back quotes in minutes." />
    <meta name="twitter:image" content="https://homiepro.ai/og-image.png" />

    <!-- Theme & mobile -->
    <meta name="theme-color" content="#E8632B" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Homie" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Homie",
      "url": "https://homiepro.ai",
      "logo": "https://homiepro.ai/og-image.png",
      "description": "AI-powered home maintenance platform that connects homeowners and property managers with local service providers.",
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "yo@homiepro.ai",
        "contactType": "customer service"
      },
      "sameAs": []
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Homie",
      "url": "https://homiepro.ai",
      "description": "AI-powered home maintenance and service provider matching platform",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://homiepro.ai/quote",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Homie",
      "applicationCategory": "HomeApplication",
      "operatingSystem": "Web",
      "url": "https://homiepro.ai",
      "description": "AI-powered home maintenance diagnostic and service provider matching. Get quotes from local plumbers, electricians, HVAC technicians, and more in minutes.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD",
        "description": "Free DIY diagnostic chat"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "Homie",
      "url": "https://homiepro.ai",
      "email": "yo@homiepro.ai",
      "description": "AI-powered home maintenance diagnostic and service provider matching platform",
      "areaServed": {
        "@type": "Country",
        "name": "United States"
      },
      "serviceType": ["Plumbing", "Electrical", "HVAC", "Appliance Repair", "Roofing", "Landscaping", "Pest Control", "General Handyman", "Cleaning", "Home Inspection"]
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How does Homie work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Describe your home issue and Homie's AI agent simultaneously calls, texts, and contacts local service providers on your behalf. Responses stream back with quotes and availability so you can compare and book — all without making a single phone call yourself."
          }
        },
        {
          "@type": "Question",
          "name": "How much does Homie cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Homie offers three tiers: Standard ($9.99) contacts 5 pros via SMS and web with results in about 2 hours, Priority ($19.99) contacts 10 pros via voice, SMS, and web with results in about 30 minutes, and Emergency ($29.99) blitzes 15 pros across all channels with results in about 15 minutes. You are only charged if you receive quotes."
          }
        },
        {
          "@type": "Question",
          "name": "Is the diagnostic really free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, the AI diagnostic chat is 100% free. You can describe your issue, upload a photo, and receive an expert-level diagnosis with DIY steps, cost estimates, and a severity assessment — all in under 2 minutes with no payment required."
          }
        },
        {
          "@type": "Question",
          "name": "How fast do I get quotes?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Depending on the tier you choose, you can receive quotes in as little as 15 minutes (Emergency), about 30 minutes (Priority), or around 2 hours (Standard). Homie contacts multiple providers simultaneously so quotes come back fast."
          }
        },
        {
          "@type": "Question",
          "name": "Do I have to talk to contractors myself?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Homie's AI agent handles all the outreach for you — making phone calls, sending texts, and submitting web forms to local pros. You just review the quotes and availability that come back and pick the provider you want."
          }
        }
      ]
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        {"@type": "ListItem", "position": 1, "name": "Home", "item": "https://homiepro.ai/"},
        {"@type": "ListItem", "position": 2, "name": "Free Diagnostic", "item": "https://homiepro.ai/chat"},
        {"@type": "ListItem", "position": 3, "name": "Get Quotes", "item": "https://homiepro.ai/quote"},
        {"@type": "ListItem", "position": 4, "name": "For Business", "item": "https://homiepro.ai/business/landing"}
      ]
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <!-- API preconnect -->
    <link rel="preconnect" href="https://api.homiepro.ai" crossorigin />
    <link rel="dns-prefetch" href="https://api.homiepro.ai" />

    <!-- Stripe -->
    <link rel="dns-prefetch" href="https://js.stripe.com" />

    <!-- Google Maps -->
    <link rel="dns-prefetch" href="https://maps.googleapis.com" />

    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&display=swap"
      rel="stylesheet"
    />
