<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Homie — AI-Powered Home Maintenance & Service Provider Matching</title>
    <meta name="description" content="Stop calling around for home repair quotes. Homie's AI agent calls, texts, and emails local pros for you — and brings back quotes in minutes. Free DIY diagnostics, plumbing, HVAC, electrical, and 16+ service categories." />
    <meta name="keywords" content="home maintenance, home repair, plumber near me, HVAC repair, electrician, get quotes, AI home services, property management, vacation rental maintenance, find contractor, home service quotes" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="canonical" href="https://homiepro.ai/" />

    <!-- Open Graph (Facebook, WhatsApp, iMessage, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://homiepro.ai/" />
    <meta property="og:title" content="Homie — AI-Powered Home Maintenance & Service Provider Matching" />
    <meta property="og:description" content="Stop calling around. Homie's AI agent calls, texts, and contacts local pros for you — and brings back quotes in minutes." />
    <meta property="og:image" content="https://homiepro.ai/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Homie" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Homie — AI-Powered Home Maintenance" />
    <meta name="twitter:description" content="Stop calling around. Homie's AI agent calls, texts, and contacts local pros for you — and brings back quotes in minutes." />
    <meta name="twitter:image" content="https://homiepro.ai/og-image.png" />

    <!-- Theme & mobile -->
    <meta name="theme-color" content="#E8632B" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Homie" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Homie",
      "url": "https://homiepro.ai",
      "logo": "https://homiepro.ai/og-image.png",
      "description": "AI-powered home maintenance platform that connects homeowners and property managers with local service providers.",
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "yo@homiepro.ai",
        "contactType": "customer service"
      },
      "sameAs": []
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Homie",
      "url": "https://homiepro.ai",
      "description": "AI-powered home maintenance and service provider matching platform",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://homiepro.ai/quote",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Homie",
      "applicationCategory": "HomeApplication",
      "operatingSystem": "Web",
      "url": "https://homiepro.ai",
      "description": "AI-powered home maintenance diagnostic and service provider matching. Get quotes from local plumbers, electricians, HVAC technicians, and more in minutes.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD",
        "description": "Free DIY diagnostic chat"
      }
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
